# Usar com: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Em dev o Redis fica acessível localmente (127.0.0.1:6379)
# para permitir redis-cli, Bull Board, etc.
# A senha ainda é obrigatória — nunca tire o requirepass.

version: '3.8'

services:

  # Em dev: Redis exposto localmente para debug
  redis:
    ports:
      - "127.0.0.1:6379:6379"   # só localhost — não expõe para rede do host
    networks:
      - internal_dev

  # Em dev: Qdrant exposto localmente para debug
  qdrant:
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - internal_dev

  # Em dev: API com hot-reload
  api:
    build:
      target: deps
    command: npm run dev --workspace=apps/api
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    environment:
      NODE_ENV: development
      # Em dev também usa senha — evita divergência de comportamento
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - internal_dev
      - external_dev

  # Em dev: Web com Vite HMR
  web:
    build:
      target: builder
    command: npm run dev --workspace=apps/web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      VITE_API_URL: http://localhost:3001
    networks:
      - external_dev

networks:
  internal_dev:
    driver: bridge
    # sem 'internal: true' em dev — containers precisam de internet para npm, etc.
  external_dev:
    driver: bridge
