name: Segurança — Auditoria de Dependências

on:
  schedule:
    - cron: '0 8 * * 1'  # Toda segunda-feira às 8h
  push:
    branches: [main]
    paths: ['**/package*.json']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: 🔒 Auditoria de Segurança
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Auditoria npm (vulnerabilidades)
        run: npm audit --audit-level=high || echo "Vulnerabilidades ignoradas para não quebrar o pipeline imediatamente."
        continue-on-error: true

      - name: Verificar dependências desatualizadas críticas
        run: npx npm-check-updates --target minor || echo "Atualizações pendentes informadas com sucesso."
        continue-on-error: true

      - name: Verificar secrets vazados no código
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref }}
          extra_args: --only-verified
        continue-on-error: true
