version: '3.8'

name: astrum-dev

services:
  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: astrum-redis
    ports:
      - "127.0.0.1:6379:6379"  # só localhost — sem exposição externa
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --bind 127.0.0.1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Qdrant ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: astrum-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ─── API Backend ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: astrum-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    volumes:
      - duckdb_data:/app/.data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: astrum-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─── Zep ────────────────────────────────────────────
  zep:
    image: ghcr.io/getzep/zep:latest
    container_name: astrum-zep
    ports:
      - "8000:8000"
    environment:
      ZEP_NLP_SERVER_URL: http://zep-nlp:5557
      ZEP_OPENAI_API_KEY: ${OPENAI_API_KEY}
      ZEP_STORE_TYPE: postgres
      ZEP_STORE_POSTGRES_DSN: ${SUPABASE_DB_URL}
    restart: unless-stopped

  zep-nlp:
    image: ghcr.io/getzep/zep-python:latest
    container_name: astrum-zep-nlp
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  duckdb_data:
